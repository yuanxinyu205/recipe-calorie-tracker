    const { useState, useEffect, createContext, useContext, useRef } = React;

    // ========== Auth Context ==========
    const AuthContext = createContext(null);

    function AuthProvider({ children }) {
      const [user, setUser] = useState(() => {
        const saved = localStorage.getItem('auth_user');
        return saved ? JSON.parse(saved) : null;
      });
      const [showAuthModal, setShowAuthModal] = useState(false);

      const login = (email, password) => {
        const userData = { email, name: email.split('@')[0] };
        setUser(userData);
        localStorage.setItem('auth_user', JSON.stringify(userData));
        setShowAuthModal(false);
      };

      const register = (email, password) => {
        const userData = { email, name: email.split('@')[0] };
        setUser(userData);
        localStorage.setItem('auth_user', JSON.stringify(userData));
        setShowAuthModal(false);
      };

      const logout = () => {
        setUser(null);
        localStorage.removeItem('auth_user');
      };

      const requireLogin = (callback) => {
        if (!user) {
          setShowAuthModal(true);
          return false;
        }
        if (callback) callback();
        return true;
      };

      return (
        <AuthContext.Provider value={{ user, login, register, logout, showAuthModal, setShowAuthModal, requireLogin }}>
          {children}
        </AuthContext.Provider>
      );
    }

    function useAuth() {
      const context = useContext(AuthContext);
      if (!context) throw new Error('useAuth must be used within AuthProvider');
      return context;
    }

    // ========== Auth Modal Component ==========
    function AuthModal() {
      const { showAuthModal, setShowAuthModal, login, register } = useAuth();
      const [isSignUp, setIsSignUp] = useState(false);
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [confirmPassword, setConfirmPassword] = useState('');
      const [error, setError] = useState('');
      const [loading, setLoading] = useState(false);

      const handleSubmit = async (e) => {
        e.preventDefault();
        setError('');
        if (!email || !password) {
          setError('请填写完整信息');
          return;
        }
        if (isSignUp && password !== confirmPassword) {
          setError('两次输入的密码不一致');
          return;
        }
        if (password.length < 6) {
          setError('密码至少6位');
          return;
        }
        setLoading(true);
        try {
          if (isSignUp) {
            register(email, password);
          } else {
            login(email, password);
          }
          setEmail('');
          setPassword('');
          setConfirmPassword('');
        } catch (err) {
          setError(err.message || '操作失败');
        } finally {
          setLoading(false);
        }
      };

      if (!showAuthModal) return null;

      return (
        <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center">
          <div className="absolute inset-0 bg-black/40" onClick={() => setShowAuthModal(false)} />
          <div className="relative w-full max-w-md bg-white rounded-t-2xl sm:rounded-2xl shadow-xl">
            <div className="sticky top-0 bg-white px-6 py-4 border-b border-coral-100 flex items-center justify-between">
              <h3 className="font-semibold text-xl text-gray-800">{isSignUp ? '注册账号' : '登录'}</h3>
              <button onClick={() => setShowAuthModal(false)} className="w-8 h-8 rounded-full bg-coral-50 flex items-center justify-center hover:bg-coral-100">
                <svg width={18} height={18} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="text-gray-500">
                  <line x1="18" y1="6" x2="6" y2="18" />
                  <line x1="6" y1="6" x2="18" y2="18" />
                </svg>
              </button>
            </div>
            <form onSubmit={handleSubmit} className="p-6 space-y-4">
              {error && <div className="p-3 bg-red-50 border border-red-200 rounded-lg text-sm text-red-600">{error}</div>}
              <div>
                <label className="block text-sm font-medium text-gray-700 mb-2">邮箱</label>
                <input type="email" value={email} onChange={e => setEmail(e.target.value)} placeholder="请输入邮箱" className="w-full px-4 py-3 border border-coral-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-coral-400" />
              </div>
              <div>
                <label className="block text-sm font-medium text-gray-700 mb-2">密码</label>
                <input type="password" value={password} onChange={e => setPassword(e.target.value)} placeholder="请输入密码（至少6位）" className="w-full px-4 py-3 border border-coral-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-coral-400" />
              </div>
              {isSignUp && (
                <div>
                  <label className="block text-sm font-medium text-gray-700 mb-2">确认密码</label>
                  <input type="password" value={confirmPassword} onChange={e => setConfirmPassword(e.target.value)} placeholder="请再次输入密码" className="w-full px-4 py-3 border border-coral-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-coral-400" />
                </div>
              )}
              <button type="submit" disabled={loading} className="w-full bg-coral-500 text-white py-3 rounded-lg font-medium hover:bg-coral-600 transition-colors disabled:opacity-50">
                {loading ? '处理中...' : (isSignUp ? '注册' : '登录')}
              </button>
              <button type="button" onClick={() => { setIsSignUp(!isSignUp); setError(''); }} className="w-full text-center text-coral-500 text-sm hover:text-coral-600">
                {isSignUp ? '已有账号？去登录' : '没有账号？去注册'}
              </button>
            </form>
          </div>
        </div>
      );
    }

    // 中文数字转阿拉伯数字
    function parseChineseNumber(str) {
      const chineseNumberMap = {
        '零': 0, '一': 1, '二': 2, '两': 2, '三': 3, '四': 4, 
        '五': 5, '六': 6, '七': 7, '八': 8, '九': 9, '十': 10
      };
      
      if (str in chineseNumberMap) {
        return chineseNumberMap[str];
      }
      
      if (str.startsWith('十')) {
        const afterTen = str.slice(1);
        if (afterTen === '') return 10;
        return 10 + (chineseNumberMap[afterTen] || 0);
      }
      
      const tenMatch = str.match(/^(\w+)十(\w*)$/);
      if (tenMatch) {
        const tens = chineseNumberMap[tenMatch[1]] || 1;
        const ones = chineseNumberMap[tenMatch[2]] || 0;
        return tens * 10 + ones;
      }
      
      const num = parseFloat(str);
      if (!isNaN(num)) {
        return num;
      }
      
      return 1;
    }

      const weightUnits = ['g', '克', 'kg', '千克', 'ml', '毫升'];
      
      for (const unit of quantityUnits) {
        const pattern = new RegExp(`^(.*?)${unit}(.+)$`);
        const match = text.match(pattern);
        if (match) {
          const quantity = parseChineseNumber(match[1]);
          const foodName = match[2].trim();
          if (foodCaloriesDb[foodName]) {
            const foodData = foodCaloriesDb[foodName];
            const weight = quantity * foodData.defaultWeight;
            const calories = Math.round((foodData.calories * weight) / 100);
            return { name: foodName, quantity, quantityUnit: unit, weight, caloriesPer100g: foodData.calories, calories };
          }
        }
      }
      
      for (const unit of quantityUnits) {
        const pattern = new RegExp(`^(.+?)([^\\d]+?)${unit}$`);
        const match = text.match(pattern);
        if (match) {
          const foodName = match[1].trim();
          if (foodCaloriesDb[foodName]) {
            const quantity = parseChineseNumber(match[2]);
            const foodData = foodCaloriesDb[foodName];
            const weight = quantity * foodData.defaultWeight;
            const calories = Math.round((foodData.calories * weight) / 100);
            return { name: foodName, quantity, quantityUnit: unit, weight, caloriesPer100g: foodData.calories, calories };
          }
        }
      }
      
      for (const unit of weightUnits) {
        const pattern = new RegExp(`^(\\d+)${unit}(.+)$`);
        const match = text.match(pattern);
        if (match) {
          let weight = parseFloat(match[1]);
          const foodName = match[2].trim();
          if (unit === 'kg' || unit === '千克') weight *= 1000;
          if (foodCaloriesDb[foodName]) {
            const foodData = foodCaloriesDb[foodName];
            const calories = Math.round((foodData.calories * weight) / 100);
            return { name: foodName, weight, caloriesPer100g: foodData.calories, calories };
          }
        }
      }
      
      for (const unit of weightUnits) {
        const pattern = new RegExp(`^(.+?)(\\d+)${unit}$`);
        const match = text.match(pattern);
        if (match) {
          const foodName = match[1].trim();
          if (foodCaloriesDb[foodName]) {
            let weight = parseFloat(match[2]);
            if (unit === 'kg' || unit === '千克') weight *= 1000;
            const foodData = foodCaloriesDb[foodName];
            const calories = Math.round((foodData.calories * weight) / 100);
            return { name: foodName, weight, caloriesPer100g: foodData.calories, calories };
          }
        }
      }
      
      if (foodCaloriesDb[text]) {
        const foodData = foodCaloriesDb[text];
        const calories = Math.round((foodData.calories * foodData.defaultWeight) / 100);
        return { name: text, weight: foodData.defaultWeight, caloriesPer100g: foodData.calories, calories };
      }
      
      return { name: text, weight: 100, caloriesPer100g: 0, calories: 0 };
    }
    
    // 自然语言输入解析
    function parseFoodInput(input) {
      const foods = [];
      
      const items = input
        .replace(/[，,。、]/g, '|')
        .split('|')
        .map(item => item.trim())
        .filter(item => item);
      
      for (let item of items) {
        const halfMatch = item.match(/^(.+?)(个|颗|只|杯|碗|份|片|根|条|块|瓣|朵|粒|把|捆|棵)半(.+)?$/);
        if (halfMatch) {
          const numStr = halfMatch[1];
          const unit = halfMatch[2];
          const foodName = (halfMatch[3] || '').trim();
          const quantity = parseChineseNumber(numStr) + 0.5;
          
          if (foodName && foodCaloriesDb[foodName]) {
            const foodData = foodCaloriesDb[foodName];
            const weight = quantity * foodData.defaultWeight;
            const calories = Math.round((foodData.calories * weight) / 100);
            foods.push({ name: foodName, quantity, quantityUnit: unit, weight, caloriesPer100g: foodData.calories, calories });
            continue;
          }
        }
        
        if (item.startsWith('半')) {
          const rest = item.slice(1).trim();
          const quantityUnits = ['个', '颗', '只', '杯', '碗', '份', '片', '根', '条', '块', 
                                '瓣', '朵', '粒', '把', '捆', '棵'];
          let matched = false;
          for (const unit of quantityUnits) {
            if (rest.startsWith(unit)) {
              const foodName = rest.slice(1).trim();
              if (foodCaloriesDb[foodName]) {
                const foodData = foodCaloriesDb[foodName];
                const weight = 0.5 * foodData.defaultWeight;
                const calories = Math.round((foodData.calories * weight) / 100);
                foods.push({ name: foodName, quantity: 0.5, quantityUnit: unit, weight, caloriesPer100g: foodData.calories, calories });
                matched = true;
                break;
              }
            }
          }
          if (!matched) {
            foods.push({ name: item, weight: 50, caloriesPer100g: 0, calories: 0 });
          }
          continue;
        }
        
        const result = parseFoodItem(item);
        foods.push(result);
      }
      
      return foods;
    }

    const getRecentMondays = (count = 10) => {
      const mondays = [];
      const now = new Date();
      const dayOfWeek = now.getDay();
      const diff = dayOfWeek === 0 ? 6 : dayOfWeek - 1;
      const thisMonday = new Date(now);
      thisMonday.setDate(now.getDate() - diff);
      
      for (let i = 0; i < count; i++) {
        const date = new Date(thisMonday);
        date.setDate(thisMonday.getDate() - i * 7);
        mondays.push(`${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`);
      }
      return mondays;

    // ========== Store ==========
    const StoreContext = createContext(null);

    function useStore() {
      const store = useContext(StoreContext);
      if (!store) throw new Error('useStore must be used within StoreProvider');
      return store;
    }

    function StoreProvider({ children }) {
      const { user } = useAuth();
      
      const getStorageKey = (key) => user ? `${user.email}_${key}` : key;

      const [userProfile, setUserProfile] = useState(() => {
        const saved = localStorage.getItem(getStorageKey('userProfile'));
        return saved ? JSON.parse(saved) : { height: 170, weight: 65, gender: 'male', dailyCalorieTarget: 2000 };
      });
      const [todayRecord, setTodayRecord] = useState(() => {
        const saved = localStorage.getItem(getStorageKey('todayRecord'));
        const parsed = saved ? JSON.parse(saved) : null;
        if (parsed && parsed.date === getTodayDate()) return parsed;
        return { date: getTodayDate(), meals: { breakfast: [], lunch: [], dinner: [] }, totalCalories: 0 };
      });
      const [recipes, setRecipes] = useState(() => {
        const saved = localStorage.getItem(getStorageKey('recipes'));
        return saved ? JSON.parse(saved) : defaultRecipes;
      });
      const [historyRecords, setHistoryRecords] = useState(() => {
        const saved = localStorage.getItem(getStorageKey('historyRecords'));
        return saved ? JSON.parse(saved) : [];
      });
      const [weightRecords, setWeightRecords] = useState(() => {
        const saved = localStorage.getItem(getStorageKey('weightRecords'));
        return saved ? JSON.parse(saved) : {};
      });
      const [initialWeight, setInitialWeight] = useState(() => {
        const saved = localStorage.getItem(getStorageKey('initialWeight'));
        return saved ? JSON.parse(saved) : null;
      });
      const [calorieRecords, setCalorieRecords] = useState(() => {
        const saved = localStorage.getItem(getStorageKey('calorieRecords'));
        return saved ? JSON.parse(saved) : {};
      });

      useEffect(() => { localStorage.setItem(getStorageKey('userProfile'), JSON.stringify(userProfile)); }, [userProfile, user]);
      useEffect(() => { localStorage.setItem(getStorageKey('todayRecord'), JSON.stringify(todayRecord)); }, [todayRecord, user]);
      useEffect(() => { localStorage.setItem(getStorageKey('recipes'), JSON.stringify(recipes)); }, [recipes, user]);
      useEffect(() => { localStorage.setItem(getStorageKey('historyRecords'), JSON.stringify(historyRecords)); }, [historyRecords, user]);
      useEffect(() => { localStorage.setItem(getStorageKey('weightRecords'), JSON.stringify(weightRecords)); }, [weightRecords, user]);
      useEffect(() => { localStorage.setItem(getStorageKey('initialWeight'), JSON.stringify(initialWeight)); }, [initialWeight, user]);
      useEffect(() => { localStorage.setItem(getStorageKey('calorieRecords'), JSON.stringify(calorieRecords)); }, [calorieRecords, user]);

      useEffect(() => {
        if (todayRecord.date && todayRecord.totalCalories > 0) {
          setCalorieRecords(prev => ({ ...prev, [todayRecord.date]: todayRecord.totalCalories }));
        }
      }, [todayRecord]);

      const updateUserProfile = (profile) => setUserProfile(prev => ({ ...prev, ...profile }));

      const addFood = (meal, food) => {
        setTodayRecord(prev => {
          const newMeals = { ...prev.meals, [meal]: [...prev.meals[meal], { ...food, id: generateId() }] };
          const totalCalories = Object.values(newMeals).flat().reduce((sum, f) => sum + f.calories, 0);
          return { ...prev, meals: newMeals, totalCalories };
        });
      };

      const addFoods = (meal, foods) => {
        setTodayRecord(prev => {
          const newFoods = foods.map(f => ({ ...f, id: generateId() }));
          const newMeals = { ...prev.meals, [meal]: [...prev.meals[meal], ...newFoods] };
          const totalCalories = Object.values(newMeals).flat().reduce((sum, f) => sum + f.calories, 0);
          return { ...prev, meals: newMeals, totalCalories };
        });
      };

      const removeFood = (meal, foodId) => {
        setTodayRecord(prev => {
          const newMeals = { ...prev.meals, [meal]: prev.meals[meal].filter(f => f.id !== foodId) };
          const totalCalories = Object.values(newMeals).flat().reduce((sum, f) => sum + f.calories, 0);
          return { ...prev, meals: newMeals, totalCalories };
        });
      };

      const updateWeight = (weight) => setTodayRecord(prev => ({ ...prev, weight }));

      const addRecipe = (recipe) => setRecipes(prev => [...prev, { ...recipe, id: generateId() }]);

      const updateRecipe = (id, updatedRecipe) => setRecipes(prev => prev.map(r => r.id === id ? { ...updatedRecipe, id } : r));

      const deleteRecipe = (id) => setRecipes(prev => prev.filter(r => r.id !== id));

      const addToHistory = (record) => {
        setHistoryRecords(prev => {
          const existing = prev.findIndex(r => r.date === record.date);
          if (existing >= 0) { const updated = [...prev]; updated[existing] = record; return updated; }
          return [...prev, record];
        });
      };
      
      const updateHistoryWeight = (date, weight) => {
        setHistoryRecords(prev => {
          const existing = prev.findIndex(r => r.date === date);
          if (existing >= 0) { 
            const updated = [...prev]; 
            updated[existing] = { ...updated[existing], weight }; 
            return updated; 
          }
          return [...prev, { date, weight }];
        });
      };
      
      const setWeightForDate = (date, weight) => {
        setWeightRecords(prev => ({ ...prev, [date]: weight }));
      };
      
      const setCaloriesForDate = (date, calories) => {
        setCalorieRecords(prev => ({ ...prev, [date]: calories }));
      };
      
      const updateInitialWeight = (weight) => {
        setInitialWeight(weight);
      };

      return (
        <StoreContext.Provider value={{ 
          userProfile, updateUserProfile, todayRecord, addFood, addFoods, removeFood, 
          updateWeight, recipes, addRecipe, updateRecipe, deleteRecipe, historyRecords, addToHistory,
          updateHistoryWeight, weightRecords, setWeightForDate, initialWeight, updateInitialWeight, foodCaloriesDb,
          calorieRecords, setCaloriesForDate
        }}>
          {children}
        </StoreContext.Provider>
      );
    }

    function MealInput() {
      const { todayRecord, addFoods, removeFood, recipes, foodCaloriesDb } = useStore();
      const [activeMeal, setActiveMeal] = useState('breakfast');
      const [isAddingFood, setIsAddingFood] = useState(false);
      const [showRecipeSelect, setShowRecipeSelect] = useState(false);
      const [selectedRecipe, setSelectedRecipe] = useState(null);
      const [searchQuery, setSearchQuery] = useState('');
      const [foodInput, setFoodInput] = useState('');
      const [parsedFoods, setParsedFoods] = useState([]);
      const [showParsed, setShowParsed] = useState(false);
      const dropDownRef = useRef(null);

      const mealLabels = { breakfast: '早餐', lunch: '午餐', dinner: '晚餐' };

      useEffect(() => {
        const handleClickOutside = (event) => {
          if (dropDownRef.current && !dropDownRef.current.contains(event.target)) setShowRecipeSelect(false);
        };
        document.addEventListener('mousedown', handleClickOutside);
        return () => document.removeEventListener('mousedown', handleClickOutside);
      }, []);

      const handleParseInput = () => {
        if (!foodInput.trim()) return;
        const foods = parseFoodInput(foodInput);
        setParsedFoods(foods);
        setShowParsed(true);
      };

      const handleConfirmFoods = () => {
        addFoods(activeMeal, parsedFoods);
        setFoodInput('');
        setParsedFoods([]);
        setShowParsed(false);
        setIsAddingFood(false);
      };

      const handleSelectRecipe = (recipe) => {
        setSelectedRecipe(recipe);
        setShowRecipeSelect(false);
        setSearchQuery(recipe.name);
      };

      const handleApplyRecipe = () => {
        if (!selectedRecipe) return;
        const totalWeight = selectedRecipe.ingredients.reduce((sum, ing) => sum + ing.weight, 0);
        const avgCalories = selectedRecipe.totalCalories / (totalWeight / 100);
        const food = { name: selectedRecipe.name, weight: totalWeight, caloriesPer100g: Math.round(avgCalories), calories: selectedRecipe.totalCalories };
        addFoods(activeMeal, [food]);
        setSelectedRecipe(null);
        setSearchQuery('');
        setIsAddingFood(false);
      };

      const filteredRecipes = recipes.filter(r => r.name.toLowerCase().includes(searchQuery.toLowerCase()));
      const currentMealFoods = todayRecord.meals[activeMeal];

      return (
        <div className="bg-white rounded-xl p-4 shadow-sm mb-4">
          <div className="flex gap-2 mb-4">
            {['breakfast', 'lunch', 'dinner'].map(meal => (
              <button key={meal} onClick={() => setActiveMeal(meal)} className={`flex-1 py-2 rounded-lg font-medium text-sm transition-colors ${activeMeal === meal ? 'bg-coral-500 text-white shadow-md' : 'bg-coral-50 text-coral-600'}`}>{mealLabels[meal]}</button>

          </div>
          <div className="space-y-2 mb-4">
            {currentMealFoods.length === 0 ? <p className="text-center text-gray-400 py-4 text-sm">还没有添加食物</p> : currentMealFoods.map(item => <FoodItem key={item.id} item={item} onDelete={() => removeFood(activeMeal, item.id)} />)}
          </div>

              <div className="relative" ref={dropDownRef}>
                <div className="flex gap-2">
                  <div className="flex-1 relative">
                    <input type="text" placeholder="搜索菜谱..." value={searchQuery} onChange={e => { setSearchQuery(e.target.value); if (!showRecipeSelect) setShowRecipeSelect(true); }} onFocus={() => setShowRecipeSelect(true)} className="w-full pl-10 pr-3 py-2 border border-coral-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-coral-400" />
                    <Icon name="search" size={18} className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400" />
                  </div>
                  <button onClick={() => setShowRecipeSelect(!showRecipeSelect)} className="px-3 py-2 bg-coral-100 text-coral-600 rounded-lg hover:bg-coral-200"><Icon name="chevronDown" size={20} /></button>
                </div>
                {showRecipeSelect && (
                  <div className="absolute z-10 w-full mt-2 bg-white rounded-lg shadow-lg border border-coral-100 max-h-60 overflow-y-auto">
                    {filteredRecipes.length === 0 ? <p className="text-center text-gray-400 py-3 text-sm">未找到菜谱</p> : filteredRecipes.map(recipe => (
                      <button key={recipe.id} onClick={() => handleSelectRecipe(recipe)} className="w-full px-4 py-2 text-left hover:bg-coral-50 transition-colors">
                        <span className="font-medium text-gray-700">{recipe.name}</span>
                        <span className="text-xs text-gray-400 ml-2">{categoryNames[recipe.category]}</span>
                        <span className="text-sm text-coral-500 ml-2">{recipe.totalCalories} kcal</span>
                      </button>
                    ))}
                  </div>
                )}
              </div>
              {selectedRecipe && (
                <div className="p-3 bg-coral-50 rounded-lg">
                  <p className="font-medium text-coral-600 mb-2">{selectedRecipe.name}</p>
                  <p className="text-sm text-gray-600">食材: {selectedRecipe.ingredients.map(i => i.name).join(', ')}</p>
                  <p className="text-sm text-gray-600">热量: {selectedRecipe.totalCalories} kcal</p>
                  <button onClick={handleApplyRecipe} className="mt-2 w-full bg-coral-500 text-white px-4 py-2 rounded-lg font-medium hover:bg-coral-600 transition-colors text-sm">应用此菜谱</button>

              <div className="relative">
                <div className="absolute left-1/2 -translate-x-1/2 text-xs text-gray-400 -top-3 bg-white px-2">或输入食物</div>

              <div className="relative">
                <Icon name="brain" size={20} className="absolute left-3 top-1/2 -translate-y-1/2 text-coral-400" />
                <textarea 
                  value={foodInput} 
                  onChange={e => setFoodInput(e.target.value)}
                  placeholder="输入食物及数量，例如：两个鸡蛋 100克米饭 半根黄瓜"
                  className="w-full pl-10 pr-3 py-3 border border-coral-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-coral-400 resize-none h-24"
                  rows={3}

              <div className="flex items-center gap-2">

                  <Icon name="brain" size={18} /> AI解析
                </button>
                {showParsed && (
                  <button onClick={handleConfirmFoods} className="flex-1 bg-coral-500 text-white px-4 py-2 rounded-lg font-medium hover:bg-coral-600 transition-colors">确认添加</button>
                )}
                <button onClick={() => { setIsAddingFood(false); setFoodInput(''); setParsedFoods([]); setShowParsed(false); setSelectedRecipe(null); setSearchQuery(''); }} className="px-4 bg-gray-100 text-gray-600 px-4 py-2 rounded-lg font-medium hover:bg-gray-200 transition-colors">取消</button>
              </div>
              {showParsed && parsedFoods.length > 0 && (
                <div className="p-3 bg-coral-50 rounded-lg">
                  <p className="text-sm font-medium text-coral-600 mb-2">解析结果：</p>
                  <div className="space-y-1">
                    {parsedFoods.map((food, idx) => (
                      <div key={idx} className="flex justify-between text-sm">
                        <span className="text-gray-700">
                          {food.quantity && food.quantityUnit 
                            ? `${food.name}${food.quantity}${food.quantityUnit}≈${food.weight}g` 
                            : `${food.name} ${food.weight}g`
                          }
                        </span>
                        <span className={food.calories > 0 ? 'text-coral-500' : 'text-gray-400'}>{food.calories > 0 ? `${food.calories} kcal` : '未找到热量数据'}</span>
                      </div>
                    ))}
                  </div>
                  <p className="text-sm font-medium text-coral-500 mt-2">总计: {parsedFoods.reduce((sum, f) => sum + f.calories, 0)} kcal</p>
                </div>
              )}
            </div>
          ) : (
            <button onClick={() => setIsAddingFood(true)} className="w-full py-3 border-2 border-dashed border-coral-200 rounded-lg text-coral-500 hover:border-coral-400 hover:bg-coral-50 transition-colors flex items-center justify-center gap-2">
              <Icon name="plus" size={20} /> 添加食物
            </button>
          )}
        </div>
      );
    }

    function SuggestionCard() {

      const target = userProfile.dailyCalorieTarget;
      const remaining = target - totalCalories;
      const percentage = (totalCalories / target) * 100;

      let suggestion;
      if (percentage < 50) suggestion = { type: 'add', icon: 'sparkles', title: '可以加餐', desc: `距离目标还差 ${remaining} kcal，可以适当加餐补充能量`, color: 'bg-green-50 border-green-200', iconColor: 'text-green-500' };
      else if (percentage >= 90 && percentage <= 110) suggestion = { type: 'maintain', icon: 'alert', title: '维持当前', desc: '摄入量接近目标，保持当前饮食习惯即可', color: 'bg-coral-50 border-coral-200', iconColor: 'text-coral-500' };
      else if (percentage > 110) suggestion = { type: 'reduce', icon: 'trendingDown', title: '建议减少', desc: `已超出目标 ${Math.abs(remaining)} kcal，建议减少摄入或增加运动`, color: 'bg-orange-50 border-orange-200', iconColor: 'text-orange-500' };
      else suggestion = { type: 'normal', icon: 'alert', title: '继续加油', desc: `还需 ${remaining} kcal，继续保持均衡饮食`, color: 'bg-coral-50 border-coral-200', iconColor: 'text-coral-500' };

      return (
        <div className={`bg-white rounded-xl p-4 border ${suggestion.color} mb-4`}>
          <div className="flex items-start gap-3">
            <div className={`w-10 h-10 rounded-full flex items-center justify-center ${suggestion.color}`}><Icon name={suggestion.icon} size={20} className={suggestion.iconColor} /></div>
            <div className="flex-1">

          </div>
        </div>

    function CalorieCalendar() {
      const { calorieRecords, userProfile, setCaloriesForDate } = useStore();
      const [expanded, setExpanded] = useState(false);
      const [currentMonth, setCurrentMonth] = useState(new Date());
      const [editingDate, setEditingDate] = useState(null);
      const [editingValue, setEditingValue] = useState(0);

      const getCalendarDays = () => {
        const year = currentMonth.getFullYear();
        const month = currentMonth.getMonth();
        const firstDay = new Date(year, month, 1).getDay();
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        const days = [];

        for (let i = 0; i < firstDay; i++) {
          const date = new Date(year, month, -firstDay + i + 1);
          days.push({
            date: date,
            dateStr: `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`,
            isCurrentMonth: false
          });
        }

        for (let i = 1; i <= daysInMonth; i++) {
          const date = new Date(year, month, i);
          days.push({
            date: date,
            dateStr: `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(i).padStart(2, '0')}`,
            isCurrentMonth: true
          });
        }

        return days;
      };

      const calendarDays = getCalendarDays();
      const totalDays = calendarDays.length;
      const target = userProfile.dailyCalorieTarget;

      const goToPrevMonth = () => {
        setCurrentMonth(new Date(currentMonth.getFullYear(), currentMonth.getMonth() - 1, 1));
      };

      const goToNextMonth = () => {
        setCurrentMonth(new Date(currentMonth.getFullYear(), currentMonth.getMonth() + 1, 1));
      };

      const goToToday = () => {
        setCurrentMonth(new Date());
      };

      const handleSaveCalories = () => {
        if (editingDate && editingValue >= 0) {
          if (editingValue === 0) {
            setCaloriesForDate(editingDate, undefined);
          } else {
            setCaloriesForDate(editingDate, editingValue);
          }
          setEditingDate(null);
        }
      };

      return (
        <div className="bg-white rounded-xl shadow-sm overflow-hidden">
          <button
            onClick={() => setExpanded(!expanded)}
            className="w-full px-4 py-3 flex items-center justify-between hover:bg-gray-50 transition-colors">
            <div className="flex items-center gap-2">
              <span className="text-lg">🔥</span>
              <span className="font-medium text-gray-800">热量日历</span>
            </div>
            <Icon name={expanded ? 'chevronDown' : 'chevronRight'} size={18} className={`text-gray-400 transition-transform ${expanded ? 'rotate-180' : ''}`} />
          </button>

          {expanded && (
            <div className="px-4 pb-4 border-t border-coral-50">
              <div className="flex items-center justify-between mt-3 mb-3">
                <button onClick={goToPrevMonth} className="p-1 hover:bg-gray-100 rounded-lg">
                  <Icon name="chevronLeft" size={18} className="text-gray-600" />
                </button>
                <h3 className="font-semibold text-gray-800 text-sm">
                  {currentMonth.getFullYear()}年{currentMonth.getMonth() + 1}月
                </h3>
                <div className="flex gap-1">
                  <button onClick={goToToday} className="px-2 py-1 text-xs bg-coral-100 text-coral-600 rounded-lg hover:bg-coral-200">今天</button>
                  <button onClick={goToNextMonth} className="p-1 hover:bg-gray-100 rounded-lg">
                    <Icon name="chevronRight" size={18} className="text-gray-600" />
                  </button>
                </div>
              </div>

              <div className="grid grid-cols-7 gap-1 mb-1">
                {['日', '一', '二', '三', '四', '五', '六'].map((d, i) => (
                  <div key={i} className="text-center py-1 text-xs font-medium text-gray-400">
                    {d}
                  </div>
                ))}
              </div>

              <div className="grid grid-cols-7 gap-1">
                {calendarDays.map((day, idx) => {
                  const calories = calorieRecords[day.dateStr];
                  const isToday = day.dateStr === getTodayDate();
                  const isEditing = editingDate === day.dateStr;

                  let bgClass = !day.isCurrentMonth ? 'bg-transparent' :
                    isToday ? 'bg-coral-100' :
                    calories ? 'bg-green-50' : 'bg-white';

                  if (isEditing) {
                    return (
                      <div key={idx} className="p-1 border border-coral-300 rounded-lg bg-coral-50">
                        <div className="text-center mb-0.5">
                          <span className="text-xs font-medium">{day.date.getDate()}</span>
                        </div>
                        <input
                          type="number"
                          step="1"
                          min="0"
                          value={editingValue || ''}
                          onChange={(e) => setEditingValue(Number(e.target.value))}
                          className="w-full px-1 py-0.5 text-xs border border-coral-300 rounded text-center"
                          autoFocus
                          onBlur={handleSaveCalories}
                          onKeyDown={(e) => {
                            if (e.key === 'Enter') handleSaveCalories();
                            if (e.key === 'Escape') setEditingDate(null);
                          }}
                        />
                      </div>
                    );
                  }

                  return (
                    <div
                      key={idx}
                      onClick={() => {
                        if (day.isCurrentMonth) {
                          setEditingValue(calories || 0);
                          setEditingDate(day.dateStr);
                        }
                      }}
                      className={`p-1 rounded-lg text-center cursor-pointer transition-all ${bgClass} ${isToday ? 'border-2 border-coral-400' : ''} ${!day.isCurrentMonth ? 'text-gray-300 cursor-default' : 'hover:bg-coral-50'}`}

    // ========== Weight Tracking Page Components ==========
    function WeightTrackingPage() {
      const { initialWeight, updateInitialWeight, weightRecords, setWeightForDate } = useStore();
      const [currentMonth, setCurrentMonth] = useState(new Date());
      const [editingInitial, setEditingInitial] = useState(false);
      const [editingInitialWeight, setEditingInitialWeight] = useState(initialWeight?.weight || 0);
      const [editingInitialDate, setEditingInitialDate] = useState(initialWeight?.date || getTodayDate());
      const [editingDate, setEditingDate] = useState(null);
      const [editingDateWeight, setEditingDateWeight] = useState(0);
      
      const getThisMonday = () => {
        const now = new Date();
        const dayOfWeek = now.getDay();
        const diff = dayOfWeek === 0 ? 6 : dayOfWeek - 1;
        const monday = new Date(now);
        monday.setDate(now.getDate() - diff);
        return `${monday.getFullYear()}-${String(monday.getMonth() + 1).padStart(2, '0')}-${String(monday.getDate()).padStart(2, '0')}`;
      };
      
      const thisMonday = getThisMonday();
      const thisMondayWeight = weightRecords[thisMonday];
      
      const totalWeightLoss = initialWeight?.weight && thisMondayWeight 
        ? initialWeight.weight - thisMondayWeight
        : 0;
      
      const getCalendarDays = () => {
        const year = currentMonth.getFullYear();
        const month = currentMonth.getMonth();
        const firstDay = new Date(year, month, 1).getDay();
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        const days = [];
        
        for (let i = 0; i < firstDay; i++) {
          const date = new Date(year, month, -firstDay + i + 1);
          days.push({ 
            date: date, 
            dateStr: `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`,
            isCurrentMonth: false
          });
        }
        
        for (let i = 1; i <= daysInMonth; i++) {
          const date = new Date(year, month, i);
          days.push({ 
            date: date, 
            dateStr: `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(i).padStart(2, '0')}`,
            isCurrentMonth: true
          });
        }
        
        return days;
      };
      
      const calendarDays = getCalendarDays();
      
      const handleSaveInitialWeight = () => {
        if (editingInitialWeight > 0) {
          updateInitialWeight({ weight: editingInitialWeight, date: editingInitialDate || getTodayDate() });
          setEditingInitial(false);
        }
      };
      
      const handleSaveDateWeight = () => {
        if (editingDate && editingDateWeight > 0) {
          setWeightForDate(editingDate, editingDateWeight);
          setEditingDate(null);
        }
      };
      
      const formatDateForDisplay = (dateStr) => {
        const date = new Date(dateStr);
        return `${date.getFullYear()}年${date.getMonth() + 1}月${date.getDate()}日`;
      };
      
      const isMonday = (dateStr) => {
        return new Date(dateStr).getDay() === 1;
      };
      
      const goToPrevMonth = () => {
        setCurrentMonth(new Date(currentMonth.getFullYear(), currentMonth.getMonth() - 1, 1));
      };
      
      const goToNextMonth = () => {
        setCurrentMonth(new Date(currentMonth.getFullYear(), currentMonth.getMonth() + 1, 1));
      };
      
      const goToToday = () => {
        setCurrentMonth(new Date());
      };
      
      return (
        <div className="space-y-4">
          <div className="bg-white rounded-xl p-4 shadow-sm">
            <h3 className="font-semibold text-gray-800 mb-4 flex items-center gap-2">
              <Icon name="scale" size={20} className="text-coral-500" />
              体重记录
            </h3>
            
            <div className="grid grid-cols-3 gap-4">
              <div className="p-3 bg-gray-50 rounded-lg">
                <p className="text-xs text-gray-500 mb-1">初始体重</p>
                {editingInitial ? (
                  <div className="space-y-2">
                    <div className="flex items-center gap-2">
                      <input 
                        type="number" 
                        step="0.1"
                        value={editingInitialWeight || ''}
                        onChange={(e) => setEditingInitialWeight(Number(e.target.value))}
                        className="w-20 px-2 py-1 border border-coral-300 rounded text-sm"
                        autoFocus
                      />
                      <span className="text-sm text-gray-500">斤</span>
                      <button onClick={handleSaveInitialWeight} className="text-coral-500 hover:text-coral-600">
                        <span className="text-xs font-medium">保存</span>
                      </button>
                    </div>
                    <div className="flex items-center gap-2">
                      <span className="text-xs text-gray-500">日期</span>
                      <input 
                        type="date" 
                        value={editingInitialDate || ''}
                        onChange={(e) => setEditingInitialDate(e.target.value)}
                        className="px-2 py-1 border border-coral-300 rounded text-xs"
                      />
                    </div>
                  </div>
                ) : (
                  <div className="flex items-center justify-between">
                    <span className="text-lg font-bold text-gray-800">
                      {initialWeight?.weight ? `${initialWeight.weight.toFixed(1)} 斤` : '-'}
                    </span>
                    <button onClick={() => {
                      setEditingInitialWeight(initialWeight?.weight || 0);
                      setEditingInitialDate(initialWeight?.date || getTodayDate());
                      setEditingInitial(true);
                    }} className="text-coral-400 hover:text-coral-600">
                      <Icon name="edit" size={14} />
                    </button>
                  </div>
                )}
                {!editingInitial && initialWeight?.date && (
                  <p className="text-xs text-gray-400 mt-1">{formatDateForDisplay(initialWeight.date)}</p>
                )}
              </div>
              
              <div className="p-3 bg-coral-50 rounded-lg">
                <p className="text-xs text-coral-600 mb-1">本周一体重</p>
                {editingDate === thisMonday ? (
                  <div className="flex items-center gap-2">
                    <input 
                      type="number" 
                      step="0.1"
                      value={editingDateWeight || ''}
                      onChange={(e) => setEditingDateWeight(Number(e.target.value))}
                      className="w-20 px-2 py-1 border border-coral-300 rounded text-sm"
                      autoFocus
                    />
                    <span className="text-sm text-gray-500">斤</span>
                    <button onClick={handleSaveDateWeight} className="text-coral-500 hover:text-coral-600">
                      <span className="text-xs font-medium">保存</span>
                    </button>
                    <button onClick={() => setEditingDate(null)} className="text-gray-400 hover:text-gray-600">
                      <span className="text-xs">取消</span>
                    </button>
                  </div>
                ) : (
                  <div className="flex items-center justify-between">
                    <span className="text-lg font-bold text-coral-600">
                      {thisMondayWeight ? `${thisMondayWeight.toFixed(1)} 斤` : '-'}
                    </span>
                    <button onClick={() => {
                      setEditingDateWeight(thisMondayWeight || 0);
                      setEditingDate(thisMonday);
                    }} className="text-coral-400 hover:text-coral-600">
                      <Icon name="edit" size={14} />
                    </button>
                  </div>
                )}
                <p className="text-xs text-gray-400 mt-1">{formatDateForDisplay(thisMonday)}</p>
              </div>
              
              <div className="p-3 bg-green-50 rounded-lg">
                <p className="text-xs text-green-600 mb-1">总减重</p>
                <span className={`text-lg font-bold ${totalWeightLoss > 0 ? 'text-green-600' : totalWeightLoss < 0 ? 'text-red-500' : 'text-gray-600'}`}>
                  {initialWeight?.weight && thisMondayWeight 
                    ? `${totalWeightLoss > 0 ? '-' : ''}${Math.abs(totalWeightLoss).toFixed(1)} 斤`
                    : '-'}
                </span>
                {totalWeightLoss > 0 && <p className="text-xs text-green-400 mt-1">继续加油！</p>}
              </div>
            </div>
          </div>
          
          <div className="bg-white rounded-xl p-4 shadow-sm">
            <div className="flex items-center justify-between mb-4">
              <button onClick={goToPrevMonth} className="p-2 hover:bg-gray-100 rounded-lg">
                <Icon name="chevronLeft" size={20} className="text-gray-600" />
              </button>
              <h3 className="font-semibold text-gray-800">
                {currentMonth.getFullYear()}年{currentMonth.getMonth() + 1}月
              </h3>
              <div className="flex gap-2">
                <button onClick={goToToday} className="px-3 py-1 text-sm bg-coral-100 text-coral-600 rounded-lg hover:bg-coral-200">
                  今天
                </button>
                <button onClick={goToNextMonth} className="p-2 hover:bg-gray-100 rounded-lg">
                  <Icon name="chevronRight" size={20} className="text-gray-600" />
                </button>
              </div>
            </div>
            
            <div className="grid grid-cols-7 gap-1 mb-2">
              {['日', '一', '二', '三', '四', '五', '六'].map((day, i) => (
                <div key={i} className={`text-center py-2 text-sm font-medium ${i === 1 ? 'text-red-500' : 'text-gray-500'}`}>
                  {day}
                </div>
              ))}
            </div>
            
            <div className="grid grid-cols-7 gap-1">
              {calendarDays.map((day, i) => {
                const weight = weightRecords[day.dateStr];
                const isToday = day.dateStr === getTodayDate();
                const isMon = isMonday(day.dateStr);
                
                if (editingDate === day.dateStr) {
                  return (
                    <div key={i} className="p-2 border border-coral-300 rounded-lg bg-coral-50">
                      <div className="text-center mb-1">
                        <span className={`text-sm font-medium ${isMon ? 'text-red-500' : 'text-gray-700'}`}>{day.date.getDate()}</span>
                      </div>
                      <input 
                        type="number" 
                        step="0.1"
                        value={editingDateWeight || ''}
                        onChange={(e) => setEditingDateWeight(Number(e.target.value))}
                        className="w-full px-1 py-0.5 text-xs border border-coral-300 rounded text-center"
                        autoFocus
                        onBlur={handleSaveDateWeight}
                        onKeyDown={(e) => {
                          if (e.key === 'Enter') handleSaveDateWeight();
                          if (e.key === 'Escape') setEditingDate(null);
                        }}
                      />
                    </div>
                  );
                }
                
                return (
                  <div 
                    key={i} 
                    onClick={() => {
                      if (day.isCurrentMonth) {
                        setEditingDateWeight(weight || 0);
                        setEditingDate(day.dateStr);
                      }
                    }}
                    className={`p-2 rounded-lg text-center cursor-pointer transition-all ${
                      !day.isCurrentMonth ? 'text-gray-300 cursor-default' :
                      isToday ? 'bg-coral-100 border-2 border-coral-400' :
                      weight ? 'bg-green-50' : 'hover:bg-gray-50'
                    }`}
                  >
                    <span className={`text-sm font-medium ${isMon && day.isCurrentMonth ? 'text-red-500' : ''}`}>
                      {day.date.getDate()}
                    </span>
                    {weight && (
                      <div className={`text-xs mt-1 ${isMon && day.isCurrentMonth ? 'text-red-500 font-semibold' : 'text-green-600'}`}>
                        {weight.toFixed(1)}斤
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
            
            <div className="flex items-center gap-4 mt-4 pt-3 border-t border-gray-100 text-xs text-gray-500">
              <div className="flex items-center gap-1">
                <div className="w-3 h-3 bg-red-100 border border-red-300 rounded"></div>
                <span>周一</span>
              </div>
              <div className="flex items-center gap-1">
                <div className="w-3 h-3 bg-coral-100 border-2 border-coral-400 rounded"></div>
                <span>今天</span>
              </div>
              <div className="flex items-center gap-1">
                <div className="w-3 h-3 bg-green-50 rounded"></div>
                <span>已记录</span>
              </div>
            </div>
          </div>
        </div>
      );
    }

    function AddRecipeModal({ onClose, editingRecipe = null }) {
      const { addRecipe, updateRecipe, foodCaloriesDb } = useStore();
      const isEditing = !!editingRecipe;
      const [name, setName] = useState(isEditing ? editingRecipe.name : '');
      const [category, setCategory] = useState(isEditing ? editingRecipe.category : 'protein');
      const [ingredients, setIngredients] = useState(isEditing ? [...editingRecipe.ingredients] : []);
      const [seasonings, setSeasonings] = useState(isEditing ? [...editingRecipe.seasonings] : []);
      const [oilType, setOilType] = useState(isEditing ? editingRecipe.oilType : '橄榄油');
      const [oilAmount, setOilAmount] = useState(isEditing ? editingRecipe.oilAmount : 10);
      const [newIngredient, setNewIngredient] = useState({ name: '', caloriesPer100g: 0, weight: 0 });
      const [newSeasoning, setNewSeasoning] = useState({ name: '', caloriesPer100g: 0, weight: 0 });

      const handleAddIngredient = () => {
        if (!newIngredient.name) return;
        const foodData = foodCaloriesDb[newIngredient.name];
        const calories = foodData ? foodData.calories : (newIngredient.caloriesPer100g || 0);
        const weight = newIngredient.weight || (foodData?.defaultWeight || 100);
        setIngredients([...ingredients, { name: newIngredient.name, caloriesPer100g: calories, weight }]);
        setNewIngredient({ name: '', caloriesPer100g: 0, weight: 0 });
      };

      const handleAddSeasoning = () => {
        if (!newSeasoning.name) return;
        const foodData = foodCaloriesDb[newSeasoning.name];
        const calories = foodData ? foodData.calories : (newSeasoning.caloriesPer100g || 0);
        const weight = newSeasoning.weight || 5;
        setSeasonings([...seasonings, { name: newSeasoning.name, caloriesPer100g: calories, weight }]);
        setNewSeasoning({ name: '', caloriesPer100g: 0, weight: 0 });
      };

      const handleRemoveIngredient = (idx) => setIngredients(ingredients.filter((_, i) => i !== idx));
      const handleRemoveSeasoning = (idx) => setSeasonings(seasonings.filter((_, i) => i !== idx));

      const calculateTotalCalories = () => {
        const ingCals = ingredients.reduce((sum, ing) => sum + (ing.caloriesPer100g * ing.weight) / 100, 0);
        const seaCals = seasonings.reduce((sum, sea) => sum + (sea.caloriesPer100g * sea.weight) / 100, 0);
        const oilData = foodCaloriesDb[oilType];
        const oilCalories = oilData ? oilData.calories : 900;
        const oilCals = (oilAmount * oilCalories) / 100;
        return Math.round(ingCals + seaCals + oilCals);
      };

      const handleSubmit = () => {
        if (!name || ingredients.length === 0) return;
        const recipeData = { name, category, ingredients, seasonings, oilType, oilAmount, totalCalories: calculateTotalCalories() };
        if (isEditing) {
          updateRecipe(editingRecipe.id, recipeData);
        } else {
          addRecipe(recipeData);
        }
        onClose();
      };

      const categories = ['protein', 'fiber', 'carbs', 'fat'];

      return (
        <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center">
          <div className="absolute inset-0 bg-black/40" onClick={onClose} />
          <div className="relative w-full max-w-lg bg-white rounded-t-2xl sm:rounded-2xl shadow-xl max-h-[85vh] overflow-y-auto">
            <div className="sticky top-0 bg-white px-4 py-3 border-b border-coral-100 flex items-center justify-between">
              <h3 className="font-semibold text-lg text-gray-800">{isEditing ? '编辑菜谱' : '添加新菜谱'}</h3>
              <button onClick={onClose} className="w-8 h-8 rounded-full bg-coral-50 flex items-center justify-center"><Icon name="x" size={18} className="text-gray-500" /></button>
            </div>
            <div className="p-4 space-y-4">
              <div><label className="block text-sm font-medium text-gray-700 mb-1">菜名</label><input type="text" value={name} onChange={e => setName(e.target.value)} placeholder="输入菜名" className="w-full px-3 py-2 border border-coral-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-coral-400" /></div>
              <div><label className="block text-sm font-medium text-gray-700 mb-1">分类</label><div className="flex gap-2">{categories.map(cat => (<button key={cat} onClick={() => setCategory(cat)} className={`flex-1 py-2 rounded-lg text-sm font-medium transition-colors ${category === cat ? 'bg-coral-500 text-white' : 'bg-coral-50 text-coral-600'}`}>{categoryNames[cat]}</button>))}</div></div>
              <div>
                <label className="block text-sm font-medium text-gray-700 mb-1">食材</label>
                {ingredients.map((ing, idx) => (<div key={idx} className="flex items-center justify-between py-2 px-3 bg-coral-50 rounded-lg mb-2">
                  <div className="text-left">
                    <span className="text-gray-700 font-medium">{ing.name}</span>
                    <span className="text-gray-500 text-sm ml-2">{ing.weight}g</span>
                    <span className="text-coral-500 text-sm ml-2">({ing.caloriesPer100g} kcal/100g)</span>
                  </div>
                  <button onClick={() => handleRemoveIngredient(idx)} className="text-coral-500"><Icon name="x" size={16} /></button>
                </div>))}
                <div className="flex gap-2">
                  <input type="text" placeholder="食材名" value={newIngredient.name} onChange={e => {
                    setNewIngredient({...newIngredient, name: e.target.value});
                    const data = foodCaloriesDb[e.target.value];
                    if (data) {
                      setNewIngredient(prev => ({...prev, caloriesPer100g: data.calories, weight: data.defaultWeight}));
                    }
                  }} className="flex-1 px-3 py-2 border border-coral-200 rounded-lg" />
                  <input type="number" placeholder="克重" value={newIngredient.weight || ''} onChange={e => setNewIngredient({...newIngredient, weight: Number(e.target.value)})} className="w-20 px-3 py-2 border border-coral-200 rounded-lg" />
                  <button onClick={handleAddIngredient} className="px-3 py-2 bg-coral-100 text-coral-600 rounded-lg"><Icon name="plus" size={20} /></button>
                </div>
              </div>
              <div>
                <label className="block text-sm font-medium text-gray-700 mb-1">调料</label>
                {seasonings.map((sea, idx) => (<div key={idx} className="flex items-center justify-between py-2 px-3 bg-gray-50 rounded-lg mb-2">
                  <div className="text-left">
                    <span className="text-gray-700 font-medium">{sea.name}</span>
                    <span className="text-gray-500 text-sm ml-2">{sea.weight}g</span>
                    <span className="text-coral-500 text-sm ml-2">({sea.caloriesPer100g} kcal/100g)</span>
                  </div>
                  <button onClick={() => handleRemoveSeasoning(idx)} className="text-gray-400"><Icon name="x" size={16} /></button>
                </div>))}
                <div className="flex gap-2">
                  <input type="text" placeholder="调料名" value={newSeasoning.name} onChange={e => {
                    setNewSeasoning({...newSeasoning, name: e.target.value});
                    const data = foodCaloriesDb[e.target.value];
                    if (data) {
                      setNewSeasoning(prev => ({...prev, caloriesPer100g: data.calories, weight: data.defaultWeight || 5}));
                    }
                  }} className="flex-1 px-3 py-2 border border-coral-200 rounded-lg" />
                  <input type="number" placeholder="克重" value={newSeasoning.weight || ''} onChange={e => setNewSeasoning({...newSeasoning, weight: Number(e.target.value)})} className="w-20 px-3 py-2 border border-coral-200 rounded-lg" />
                  <button onClick={handleAddSeasoning} className="px-3 py-2 bg-gray-100 text-gray-600 rounded-lg"><Icon name="plus" size={20} /></button>
                </div>
              </div>
              <div><label className="block text-sm font-medium text-gray-700 mb-1">油类</label><div className="flex gap-2"><select value={oilType} onChange={e => setOilType(e.target.value)} className="flex-1 px-3 py-2 border border-coral-200 rounded-lg"><option>橄榄油</option><option>花生油</option><option>菜籽油</option><option>猪油</option><option>芝麻油</option><option>无</option></select><input type="number" value={oilAmount} onChange={e => setOilAmount(Number(e.target.value))} className="w-24 px-3 py-2 border border-coral-200 rounded-lg" /></div></div>
              <div className="p-4 bg-coral-50 rounded-xl text-center"><p className="text-sm text-gray-500">计算总热量</p><p className="text-2xl font-bold text-coral-500">{calculateTotalCalories()} kcal</p></div>
              <button onClick={handleSubmit} disabled={!name || ingredients.length === 0} className="w-full bg-coral-500 text-white px-4 py-2 rounded-lg font-medium hover:bg-coral-600 transition-colors disabled:opacity-50">{isEditing ? '保存修改' : '保存菜谱'}</button>
            </div>
          </div>
        </div>
      );
    }

    function RecipesPage() {
      const { recipes, deleteRecipe } = useStore();
      const [activeCategory, setActiveCategory] = useState('protein');
      const [selectedRecipe, setSelectedRecipe] = useState(null);
      const [showAddModal, setShowAddModal] = useState(false);
      const [editingRecipe, setEditingRecipe] = useState(null);

      const filteredRecipes = activeCategory ? recipes.filter(r => r.category === activeCategory) : recipes;

      const handleEditRecipe = (recipe) => {
        setEditingRecipe(recipe);
        setShowAddModal(true);
      };

      const handleDeleteRecipe = (id) => {
        if (confirm('确定删除这个菜谱吗？')) {
          deleteRecipe(id);
        }
      };

      const handleCloseModal = () => {
        setShowAddModal(false);
        setEditingRecipe(null);
      };

      return (
        <div>
          <div className="flex items-center justify-between mb-4">
            <h2 className="text-lg font-semibold text-gray-800">菜谱库</h2>
            <button onClick={() => setShowAddModal(true)} className="bg-coral-500 text-white px-4 py-2 rounded-lg font-medium hover:bg-coral-600 transition-colors text-sm flex items-center gap-1"><Icon name="plus" size={18} />添加菜谱</button>
          </div>
          <CategorySidebar activeCategory={activeCategory} onSelectCategory={setActiveCategory} />
          <RecipeList recipes={filteredRecipes} onSelectRecipe={setSelectedRecipe} onEditRecipe={handleEditRecipe} onDeleteRecipe={handleDeleteRecipe} />
          {selectedRecipe && <RecipeDetail recipe={selectedRecipe} onClose={() => setSelectedRecipe(null)} />}
          {showAddModal && <AddRecipeModal onClose={handleCloseModal} editingRecipe={editingRecipe} />}
        </div>
      );
    }

    // ========== App ==========
    function App() {
      const [activeTab, setActiveTab] = useState('calories');

      return (
        <AuthProvider>
          <StoreProvider>
            <Layout activeTab={activeTab} onTabChange={setActiveTab}>
              {activeTab === 'calories' ? <CaloriesPage /> : 
               activeTab === 'weight' ? <WeightTrackingPage /> : 
               <RecipesPage />}
            </Layout>
            <AuthModal />
          </StoreProvider>
        </AuthProvider>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
